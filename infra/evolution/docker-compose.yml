services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: imobops-evolution-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started

  evolution-postgres:
    image: postgres:15-alpine
    container_name: imobops-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution}
    ports:
      - "5435:5432"
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution} -d ${POSTGRES_DB:-evolution}"]
      interval: 5s
      timeout: 5s
      retries: 20

  evolution-redis:
    image: redis:7-alpine
    container_name: imobops-evolution-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - evolution_redis:/data

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:
